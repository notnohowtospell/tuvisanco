version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tuvisanco-db
    restart: always
    environment:
      POSTGRES_USER: tuvi_admin
      POSTGRES_PASSWORD: tuvi_password
      POSTGRES_DB: tuvisanco
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: tuvisanco-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tuvisanco.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
